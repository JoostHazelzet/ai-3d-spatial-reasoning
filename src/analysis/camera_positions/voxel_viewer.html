<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Voxel Scene Viewer - Cell 4</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
            color: #fff;
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            max-width: 300px;
        }
        #info h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        #info p {
            margin: 5px 0;
            line-height: 1.4;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        button {
            background: #0074D9;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover {
            background: #0056a8;
        }
        .legend {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
        }
        .legend h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            font-size: 12px;
        }
        .color-box {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="info">
        <h2>Voxel Scene</h2>
        <p>Scene size: 3×3×3</p>
        <p>8 colored voxel cubes at corners</p>
        <p><strong>Controls:</strong></p>
        <p>• Left mouse: Rotate</p>
        <p>• Right mouse: Pan</p>
        <p>• Scroll: Zoom</p>
    </div>

    <div class="legend">
        <h3>Color Legend</h3>
        <div class="legend-item">
            <div class="color-box" style="background: #0074D9;"></div>
            <span>Blue (0,0,0)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #FF4136;"></div>
            <span>Red (2,0,0)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #2ECC40;"></div>
            <span>Green (0,2,0)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #FFDC00;"></div>
            <span>Yellow (1,2,0)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #AAAAAA;"></div>
            <span>Gray (0,0,2)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #F012BE;"></div>
            <span>Fuchsia (2,0,2)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #FF851B;"></div>
            <span>Orange (0,2,2)</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background: #7FDBFF;"></div>
            <span>Azure (2,2,2)</span>
        </div>
    </div>

    <div id="controls">
        <button onclick="toggleCameras()">Toggle Cameras</button>
        <button onclick="resetView()">Reset View</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ARC color palette
        const ARC_COLORS = {
            BLUE: 0x0074D9,
            RED: 0xFF4136,
            GREEN: 0x2ECC40,
            YELLOW: 0xFFDC00,
            GRAY: 0xAAAAAA,
            FUCHSIA: 0xF012BE,
            ORANGE: 0xFF851B,
            AZURE: 0x7FDBFF
        };

        // Reference voxel scene definition
        const voxelScene = {
            size: [3, 3, 3],
            objects: [
                { origin: [0, 0, 0], size: [1, 1, 1], color: ARC_COLORS.BLUE },
                { origin: [2, 0, 0], size: [1, 1, 1], color: ARC_COLORS.RED },
                { origin: [0, 2, 0], size: [1, 1, 1], color: ARC_COLORS.GREEN },
                { origin: [1, 2, 0], size: [1, 1, 1], color: ARC_COLORS.YELLOW },
                { origin: [0, 0, 2], size: [1, 1, 1], color: ARC_COLORS.GRAY },
                { origin: [2, 0, 2], size: [1, 1, 1], color: ARC_COLORS.FUCHSIA },
                { origin: [0, 2, 2], size: [1, 1, 1], color: ARC_COLORS.ORANGE },
                { origin: [2, 2, 2], size: [1, 1, 1], color: ARC_COLORS.AZURE }
            ]
        };

        // Camera viewpoint positions (orthographic views)
        const cameraViewpoints = {
            front: { position: [1, -3, 1], name: 'Bottom (-Z)' },
            back: { position: [1, 5, 1], name: 'Top (+Z)' },
            left: { position: [-3, 1, 1], name: 'Left (+X)' },
            right: { position: [5, 1, 1], name: 'Right (-X)' },
            top: { position: [1, 1, 5], name: 'Front (-Y)' },
            bottom: { position: [1, 1, -3], name: 'Back (+Y)' }
        };

        // Scene setup
        let scene, camera, renderer, controls;
        let cameraModels = [];
        let axisHelpers = [];
        let showCameras = true;
        let showAxes = true;

        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            const size = voxelScene.size[0];
            const center = (size - 1) / 2;
            const distance = size * 4.0;

            // Create camera (matching voxel editor setup)
            camera = new THREE.PerspectiveCamera(
                50,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(distance, distance, distance);
            camera.lookAt(center, center, center);

            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);

            // Add orbit controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(center, center, center);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.update();

            // Add lighting (matching voxel editor)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight1.position.set(10, 10, 10);
            directionalLight1.castShadow = true;
            directionalLight1.shadow.mapSize.width = 2048;
            directionalLight1.shadow.mapSize.height = 2048;
            directionalLight1.shadow.camera.near = 0.5;
            directionalLight1.shadow.camera.far = 50;
            directionalLight1.shadow.camera.left = -20;
            directionalLight1.shadow.camera.right = 20;
            directionalLight1.shadow.camera.top = 20;
            directionalLight1.shadow.camera.bottom = -20;
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight2.position.set(-10, -10, -10);
            scene.add(directionalLight2);

            // Add dark gray 3D grid (matching voxel editor)
            createDarkGrayGrid(size);

            // Create voxel cubes
            createVoxelScene();

            // Load camera models at viewpoints
            loadCameraModels();

            // Handle window resize
            window.addEventListener('resize', onWindowResize);

            // Start animation loop
            animate();
        }

        function createDarkGrayGrid(size) {
            const gridLines = [];
            const darkGray = 0x3c3c3c;
            
            // Grid lines at -0.5, 0.5, 1.5, ..., size-0.5
            for (let i = 0; i <= size; i++) {
                const pos = i - 0.5;
                
                // Lines parallel to X axis (varying Y and Z)
                for (let j = 0; j <= size; j++) {
                    const pos2 = j - 0.5;
                    gridLines.push(new THREE.Vector3(-0.5, pos, pos2));
                    gridLines.push(new THREE.Vector3(size - 0.5, pos, pos2));
                }
                
                // Lines parallel to Y axis (varying X and Z)
                for (let j = 0; j <= size; j++) {
                    const pos2 = j - 0.5;
                    gridLines.push(new THREE.Vector3(pos, -0.5, pos2));
                    gridLines.push(new THREE.Vector3(pos, size - 0.5, pos2));
                }
                
                // Lines parallel to Z axis (varying X and Y)
                for (let j = 0; j <= size; j++) {
                    const pos2 = j - 0.5;
                    gridLines.push(new THREE.Vector3(pos, pos2, -0.5));
                    gridLines.push(new THREE.Vector3(pos, pos2, size - 0.5));
                }
            }
            
            const gridGeometry = new THREE.BufferGeometry().setFromPoints(gridLines);
            const gridMaterial = new THREE.LineBasicMaterial({ color: darkGray });
            const grid = new THREE.LineSegments(gridGeometry, gridMaterial);
            grid.name = 'gridHelper';
            grid.rotation.x = -Math.PI / 2;  // Rotate -90 degrees around X axis
            grid.position.z = size - 1;  // Compensate for rotation shift
            scene.add(grid);
        }

        function createVoxelScene() {
            const voxelGroup = new THREE.Group();
            const voxelSize = 1.0;

            voxelScene.objects.forEach(obj => {
                const [x, y, z] = obj.origin;
                
                // Create cube geometry
                const geometry = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);
                const material = new THREE.MeshStandardMaterial({
                    color: obj.color,
                    metalness: 0.3,
                    roughness: 0.7
                });
                
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, y, z);
                cube.castShadow = true;
                cube.receiveShadow = true;
                
                // Add white edges (matching voxel editor)
                const edges = new THREE.EdgesGeometry(geometry);
                const lineMaterial = new THREE.LineBasicMaterial({
                    color: 0xffffff,
                    linewidth: 1
                });
                const wireframe = new THREE.LineSegments(edges, lineMaterial);
                cube.add(wireframe);
                
                voxelGroup.add(cube);
            });

            voxelGroup.rotation.x = -Math.PI / 2;  // Rotate -90 degrees around X axis
            voxelGroup.position.z = voxelScene.size[0] - 1;  // Compensate for rotation shift
            scene.add(voxelGroup);
        }

        function loadCameraModels() {
            const loader = new GLTFLoader();
            const cameraScale = 40;

            let loadCount = 0;
            const totalCameras = Object.keys(cameraViewpoints).length;

            Object.entries(cameraViewpoints).forEach(([key, viewpoint]) => {
                loader.load(
                    'film_camera.glb',
                    (gltf) => {
                        const cameraModel = gltf.scene;
                        cameraModel.scale.set(cameraScale, cameraScale, cameraScale);
                        
                        // Enable shadows for camera model
                        cameraModel.traverse((node) => {
                            if (node.isMesh) {
                                node.castShadow = true;
                                node.receiveShadow = true;
                            }
                        });
                        
                        const [x, y, z] = viewpoint.position;
                        cameraModel.position.set(x, y, z);
                        
                        // Point camera towards center of scene
                        cameraModel.lookAt(1, 1, 1);
                        
                        // Correct Front (-Y) camera position
                        if (key === 'top') {
                            cameraModel.rotateY(-Math.PI / 2);
                        }

                        // Correct Back (+Y) camera position
                        if (key === 'bottom') {
                            cameraModel.rotateY(-Math.PI / 2);
                        }

                        // Correct Left (+X) camera position
                        if (key === 'left') {
                            cameraModel.rotateY(-Math.PI / 2);
                        }
                
                        // Correct Right (-X) camera position
                        if (key === 'right') {
                            cameraModel.rotateY(-Math.PI / 2);
                        }

                        // Correct Top (+Z) camera position
                        if (key === 'back') {
                            cameraModel.rotateY(-Math.PI / 2);
                            cameraModel.rotateX(-Math.PI);
                        }

                        // Correct Bottom (+Z) camera position
                        if (key === 'front') {
                            cameraModel.rotateY(-Math.PI / 2);
                            cameraModel.rotateX(-Math.PI);
                        }


                        // Add label
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = 256;
                        canvas.height = 64;
                        context.fillStyle = '#ffffff';
                        context.font = 'Bold 24px Arial';
                        context.textAlign = 'center';
                        context.fillText(viewpoint.name, 128, 40);
                        
                        const texture = new THREE.CanvasTexture(canvas);
                        const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
                        const sprite = new THREE.Sprite(spriteMaterial);
                        sprite.scale.set(1.5, 0.4, 1);
                        
                        // Position label away from center by 1.5 units beyond camera
                        const center = new THREE.Vector3(1, 1, 1);
                        const direction = new THREE.Vector3().subVectors(cameraModel.position, center).normalize();
                        sprite.position.copy(cameraModel.position).add(direction.multiplyScalar(1.5));
                        
                        scene.add(sprite);
                        cameraModels.push(sprite);  // Add to cameraModels so it toggles with cameras
                        
                        scene.add(cameraModel);
                        cameraModels.push(cameraModel);
                        
                        loadCount++;
                        if (loadCount === totalCameras) {
                            console.log('All camera models loaded successfully');
                        }
                    },
                    (progress) => {
                        // Progress callback (optional)
                    },
                    (error) => {
                        console.error(`Error loading camera model for ${key}:`, error);
                        
                        // Create a fallback camera representation
                        const fallbackGeometry = new THREE.ConeGeometry(0.2, 0.5, 4);
                        const fallbackMaterial = new THREE.MeshStandardMaterial({
                            color: 0xffff00,
                            emissive: 0x444400
                        });
                        const fallbackCamera = new THREE.Mesh(fallbackGeometry, fallbackMaterial);
                        fallbackCamera.castShadow = true;
                        fallbackCamera.receiveShadow = true;
                        
                        const [x, y, z] = viewpoint.position;
                        fallbackCamera.position.set(x, y, z);
                        fallbackCamera.lookAt(1, 1, 1);
                        fallbackCamera.rotateX(Math.PI / 2);
                        
                        scene.add(fallbackCamera);
                        cameraModels.push(fallbackCamera);
                    }
                );
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Global control functions
        window.toggleCameras = function() {
            showCameras = !showCameras;
            cameraModels.forEach(model => {
                model.visible = showCameras;
            });
        };

        window.toggleAxisHelpers = function() {
            showAxes = !showAxes;
            axisHelpers.forEach(helper => {
                helper.visible = showAxes;
            });
        };

        window.resetView = function() {
            const size = voxelScene.size[0];
            const center = (size - 1) / 2;
            const distance = size * 4.0;
            camera.position.set(distance, distance, distance);
            controls.target.set(center, center, center);
            controls.update();
        };

        // Initialize the scene
        init();
    </script>
</body>
</html>
